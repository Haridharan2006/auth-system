<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Auth System</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 10px;
    }

    h3 {
      margin-top: 20px;
      margin-bottom: 10px;
      color: #333;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 95%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      background: #4facfe;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #00c6ff;
    }

    #output {
      margin-top: 15px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 6px;
      font-size: 12px;
      word-break: break-all;
      max-height: 150px;
      overflow-y: auto;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>🔐 Auth System</h2>

    <h3>Create User</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <input id="group" placeholder="Group ID">
    <button onclick="createUser()">Create User</button>

    <h3>Login</h3>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">
    <button onclick="login()">Login</button>

    <div id="output">Output will appear here...</div>
  </div>

  <script>
    const BASE_URL = "http://127.0.0.1:5000";

    async function createUser() {
      try {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const group_id = document.getElementById("group").value;

        const res = await fetch(BASE_URL + "/users/create", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password, group_id })
        });

        const data = await res.json();

        document.getElementById("output").innerText =
          "✅ User Created\n\n" + JSON.stringify(data, null, 2);

      } catch (err) {
        document.getElementById("output").innerText = "❌ Error: " + err;
      }
    }

    async function login() {
      try {
        const email = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;

        const res = await fetch(BASE_URL + "/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.token) {
          document.getElementById("output").innerText =
            "✅ Login Success\n\nToken:\n" + data.token;
        } else {
          document.getElementById("output").innerText =
            "❌ Login Failed\n" + JSON.stringify(data);
        }

      } catch (err) {
        document.getElementById("output").innerText = "❌ Error: " + err;
      }
    }
  </script>

</body>
</html>
